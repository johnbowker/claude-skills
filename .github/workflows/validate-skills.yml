name: Validate Claude Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate plugin manifest
        run: node -e "const m = require('./.claude-plugin/plugin.json'); if (!m.name || !m.description) { console.error('Missing required fields in plugin.json'); process.exit(1); } console.log('✅ Plugin manifest valid:', m.name, 'v' + (m.version || 'unversioned'));"

      - name: Validate marketplace catalog
        run: node -e "const m = require('./.claude-plugin/marketplace.json'); if (!m.name || !m.owner || !m.plugins || !m.plugins.length) { console.error('Missing required fields in marketplace.json'); process.exit(1); } m.plugins.forEach(p => { if (!p.name || !p.source) { console.error('Plugin missing name or source:', p); process.exit(1); } }); console.log('✅ Marketplace valid:', m.name, '—', m.plugins.length, 'plugin(s)');"

      - name: Validate skill format
        run: |
          ls -la skills/ | head -5
          node scripts/validate-skills.js
